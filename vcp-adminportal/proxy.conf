# CMPF Auth
ProxyPass        /cmpf-auth-rest/refresh-token http://127.0.0.1:8445/refresh-token
ProxyPassReverse /cmpf-auth-rest/refresh-token http://127.0.0.1:8445/refresh-token
ProxyPass        /cmpf-auth-rest http://127.0.0.1:8445/cmpf-rest
ProxyPassReverse /cmpf-auth-rest http://127.0.0.1:8445/cmpf-rest

# Portals
ProxyPass        /adminportal http://127.0.0.1:8444/adminportal
ProxyPassReverse /adminportal http://127.0.0.1:8444/adminportal
ProxyPass        /ccportal http://127.0.0.1:8444/ccportal
ProxyPassReverse /ccportal http://127.0.0.1:8444/ccportal

# Other services
ProxyPass        /conf http://127.0.0.1:8444/conf
ProxyPassReverse /conf http://127.0.0.1:8444/conf
ProxyPass        /vcp/services http://127.0.0.1:8444
ProxyPassReverse /vcp/services http://127.0.0.1:8444