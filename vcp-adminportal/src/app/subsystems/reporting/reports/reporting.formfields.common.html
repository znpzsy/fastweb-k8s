<div class="form-group">
    <label class="col-md-3">{{ 'Subsystems.Reporting.Category' | translate }}</label>
    <div class="col-md-9">
        <select class="form-control parsley-validated" ng-model="$parent.reportCategory"
                ng-options="report as report.label group by report.group for report in REPORTS"
                ng-change="changeReportCategory($parent.reportCategory);">
        </select>
    </div>
</div>

<div class="form-group" ng-if="isParamActive(reportCategory.additionalFields, 'operatorName')">
    <label for="operatorName" class="col-md-3">{{ 'Subsystems.Reporting.AdditionalParams.Operator' | translate }}</label>
    <div class="col-md-4">
        <select id="operatorName" name="operatorName" class="form-control"
                destroy-additional-field
                ng-model="$parent.additionalParams.operatorName"
                ng-options="operatorName.value as operatorName.text for operatorName in OPERATORS">
            <option value="">-- {{ 'CommonLabels.SelectOne' | translate }} --</option>
        </select>
    </div>
</div>

<!-- SMSC Specific Fields -->
<div class="form-group" ng-if="isParamActive(reportCategory.additionalFields, 'mcc')">
    <label for="destinationNetwork" class="col-md-3">{{ 'Subsystems.Reporting.AdditionalParams.DestinationNetwork' | translate }}</label>
    <div class="col-md-4">
        <select id="destinationNetwork" name="destinationNetwork" class="form-control"
                destroy-additional-field
                ng-change="additionalParams.mcc = destinationNetwork.selected.mcc; additionalParams.mnc = destinationNetwork.selected.mnc"
                ng-required="true"
                ng-model="$parent.destinationNetwork.selected"
                ng-options="destinationNetwork as destinationNetwork.name for destinationNetwork in DESTINATION_NETWORKS">
            <option value="">-- {{ 'CommonLabels.SelectOne' | translate }} --</option>
        </select>
        <ul ng-class="{ 'parsley-error-list': form.destinationNetwork.$dirty && form.destinationNetwork.$invalid }"
            ng-show="form.destinationNetwork.$dirty && form.destinationNetwork.$invalid">
            <li class="required" ng-show="form.destinationNetwork.$error.required">{{ 'CommonMessages.RequiredFieldError' | translate }}</li>
        </ul>
    </div>
</div>

<div class="form-group" ng-if="isParamActive(reportCategory.additionalFields, 'mcc') && destinationNetwork.selected && destinationNetwork.selected.name !== 'ALL'">
    <label for="mcc" class="col-md-3">{{ 'Subsystems.Reporting.AdditionalParams.MCC' | translate }}</label>
    <div class="col-md-4">
        <input id="mcc" name="mcc" type="text" class="form-control input-sm"
               destroy-additional-field
               maxlength="50"
               ng-disabled="destinationNetwork.selected.mcc !== null"
               ng-required="true"
               ng-model="$parent.additionalParams.mcc"/>
        <ul ng-class="{ 'parsley-error-list': form.mcc.$dirty && form.mcc.$invalid }" ng-show="form.mcc.$dirty && form.mcc.$invalid">
            <li class="required" ng-show="form.mcc.$error.required">{{ 'CommonMessages.RequiredFieldError' | translate }}</li>
        </ul>
    </div>
</div>

<div class="form-group" ng-if="isParamActive(reportCategory.additionalFields, 'mnc') && destinationNetwork.selected && destinationNetwork.selected.name !== 'ALL'"
     ng-show="additionalParams.mcc">
    <label for="mnc" class="col-md-3">{{ 'Subsystems.Reporting.AdditionalParams.MNC' | translate }}</label>
    <div class="col-md-4">
        <input id="mnc" name="mnc" type="text" class="form-control input-sm"
               destroy-additional-field
               maxlength="50"
               ng-disabled="destinationNetwork.selected.mnc !== null"
               ng-required="true"
               ng-model="$parent.additionalParams.mnc"/>
        <ul ng-class="{ 'parsley-error-list': form.mnc.$dirty && form.mnc.$invalid }" ng-show="form.mnc.$dirty && form.mnc.$invalid">
            <li class="required" ng-show="form.mnc.$error.required">{{ 'CommonMessages.RequiredFieldError' | translate }}</li>
        </ul>
    </div>
</div>
