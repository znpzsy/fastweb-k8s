<div class="modal-header">
    <h4 class="modal-title">{{ pageHeaderKey | translate }}</h4>
</div>

<div class="modal-body">

    <form class="form-horizontal parsley-form" novalidate id="form" name="form" method="post" enctype="multipart/form-data">

        <div class="form-group">
            <label for="typeOfNumber" class="col-md-3">{{ 'Products.AntiSpamSMS.Operations.Screenings.TableColumns.TypeOfNumber' | translate }}</label>
            <div class="col-md-9">
                <select id="typeOfNumber" name="typeOfNumber" class="form-control"
                        ng-model="entry.typeOfNumber"
                        ng-options="opt for opt in SMS_ANTISPAM_TYPE_OF_NUMBERS"
                        ng-disabled="(entry.id ? !AuthorizationService.canUpdate() : !AuthorizationService.canCreate())">
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="msisdnPrefix" class="col-md-3">{{ 'Products.AntiSpamSMS.Operations.Screenings.TableColumns.E164Prefix' | translate }}</label>
            <div class="col-md-9">
                <input id="msisdnPrefix" name="msisdnPrefix" type="text" class="form-control"
                       ng-model="entry.msisdnPrefix"
                       ng-maxlength="50" maxlength="50"
                       ng-required="true"
                       ng-disabled="(entry.id ? true : !AuthorizationService.canCreate())"/>
                <ul ng-class="{ 'parsley-error-list': form.msisdnPrefix.$dirty && form.msisdnPrefix.$invalid }"
                    ng-show="form.msisdnPrefix.$dirty && form.msisdnPrefix.$invalid">
                    <li class="required" ng-show="form.msisdnPrefix.$error.required">{{ 'CommonMessages.RequiredFieldError' | translate }}</li>
                    <li class="required" ng-show="form.msisdnPrefix.$error.maxlength">{{ 'CommonMessages.MaxLengthError' | translate:{max_length: 50} }}</li>
                    <li class="required" ng-show="form.msisdnPrefix.$error.availabilityCheck">{{ 'CommonMessages.ListItemAvailable' | translate }}</li>
                </ul>
            </div>
        </div>

        <div class="form-group">
            <label for="rejectMethod" class="col-md-3">{{ 'Products.AntiSpamSMS.Operations.Screenings.TableColumns.RejectMethod' | translate }}</label>
            <div class="col-md-9">
                <select id="rejectMethod" name="rejectMethod" class="form-control"
                        ng-model="entry.rejectMethod"
                        ng-options="opt for opt in SMS_ANTISPAM_REJECT_METHODS_1"
                        ng-disabled="(entry.id ? !AuthorizationService.canUpdate() : !AuthorizationService.canCreate())">
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="rejectCode" class="col-md-3">{{ 'Products.AntiSpamSMS.Operations.Screenings.TableColumns.RejectErrorCode' | translate }}</label>
            <div class="col-md-9">
                <select id="rejectCode" name="rejectCode" class="form-control"
                        ng-model="entry.rejectCode"
                        ng-options="opt for opt in SMS_ANTISPAM_REJECTION_ERROR_CODES"
                        ng-disabled="(entry.id ? !AuthorizationService.canUpdate() : !AuthorizationService.canCreate())">
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="status" class="col-md-3">{{ 'CommonLabels.State' | translate }}</label>
            <div class="col-md-9">
                <select id="status" name="status" class="form-control"
                        ng-model="entry.status"
                        ng-options="opt for opt in STATES"
                        ng-disabled="(entry.id ? !AuthorizationService.canUpdate() : !AuthorizationService.canCreate())">
                </select>
            </div>
        </div>

    </form>

</div>

<div class="modal-footer">
    <button type="submit" class="btn btn-primary"
            ng-disabled="form.$invalid || (entry.id ? !AuthorizationService.canUpdate() : !AuthorizationService.canCreate()) || isNotChanged()"
            ng-click="save(entry)">
        {{ 'CommonLabels.Save' | translate }}
    </button>
    <button class="btn btn-default" ng-click="cancel()">{{ 'CommonLabels.Cancel' | translate }}</button>
</div>
