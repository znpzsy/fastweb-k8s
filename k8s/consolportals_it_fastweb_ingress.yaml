# 1) refresh-token special-case:
# /cmpf-auth-rest/refresh-token  -->  :8445/refresh-token
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vcp-auth-refresh-ing
  namespace: fastweb-vcp-services
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /refresh-token
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "vcp-sticky"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "10800"
    nginx.ingress.kubernetes.io/session-cookie-expires: "10800"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    nginx.ingress.kubernetes.io/session-cookie-samesite: "Lax"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: fastweb-vcp.internal
      http:
        paths:
          - path: /cmpf-auth-rest/refresh-token
            pathType: Prefix
            backend:
              service:
                name: consolportals-it-fastweb-vcp-a3gw-service
                port:
                  number: 8445
    - host: localhost
      http:
        paths:
          - path: /cmpf-auth-rest/refresh-token
            pathType: Prefix
            backend:
              service:
                name: consolportals-it-fastweb-vcp-a3gw-service
                port:
                  number: 8445
---
# 2) generic auth mapping:
# /cmpf-auth-rest/<anything>  -->  :8445/cmpf-rest/<anything>
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vcp-auth-ing
  namespace: fastweb-vcp-services
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /cmpf-rest/$2
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "vcp-sticky"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "10800"
    nginx.ingress.kubernetes.io/session-cookie-expires: "10800"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    nginx.ingress.kubernetes.io/session-cookie-samesite: "Lax"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: fastweb-vcp.internal
      http:
        paths:
          - path: /cmpf-auth-rest(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: consolportals-it-fastweb-vcp-a3gw-service
                port:
                  number: 8445
    - host: localhost
      http:
        paths:
          - path: /cmpf-auth-rest(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: consolportals-it-fastweb-vcp-a3gw-service
                port:
                  number: 8445
---
